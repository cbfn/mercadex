<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mercadex — Marketplace de Eletrônicos</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="./css/style.css">
  <script src="./js/main.js" defer></script>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- Backdrop -->
  <div id="backdrop" class="backdrop" onclick="closeAll()"></div>

  <!-- ===== HEADER ===== -->
  <header class="bg-white sticky top-0 z-50 border-b border-gray-200 shadow-sm">
    <div class="max-w-7xl mx-auto px-4 h-16 flex items-center gap-4">

      <!-- Logo -->
      <a href="#" onclick="resetFilters(); return false;" class="flex items-center gap-2 flex-shrink-0">
        <img src="./assets/logo-mercadex.png" alt="Mercadex Lg" class="h-9 w-auto">
      </a>

      <!-- Search -->
      <form class="flex-1 max-w-2xl" onsubmit="return false">
        <div class="relative">
          <input
            type="search" id="searchInput"
            placeholder="Buscar eletrônicos, marcas, modelos..."
            class="w-full pl-4 pr-14 py-2.5 rounded-xl text-sm text-gray-900 bg-gray-100 border border-transparent placeholder-gray-500 outline-none focus:bg-white focus:border-orange-400 focus:ring-2 focus:ring-orange-100 transition"
            oninput="setSearch(this.value)"
          >
          <button type="button" class="absolute right-1.5 top-1/2 -translate-y-1/2 w-8 h-8 bg-orange-400 hover:bg-orange-500 text-white rounded-lg flex items-center justify-center transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"/>
            </svg>
          </button>
        </div>
      </form>

      <!-- Actions -->
      <div class="flex items-center gap-1 flex-shrink-0">
        <button class="hidden sm:flex flex-col items-center text-gray-600 hover:text-indigo-600 px-2 py-1 rounded-lg hover:bg-gray-100 transition text-[11px] gap-0.5">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/>
          </svg>
          Entrar
        </button>
        <button class="hidden sm:flex flex-col items-center text-gray-600 hover:text-indigo-600 px-2 py-1 rounded-lg hover:bg-gray-100 transition text-[11px] gap-0.5">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12z"/>
          </svg>
          Favoritos
        </button>
        <button
          id="cartBtn"
          onclick="toggleCart()"
          class="cart-btn relative flex items-center gap-2 bg-orange-400 hover:bg-orange-500 text-white font-semibold text-sm px-4 py-2.5 rounded-xl transition-colors ml-1"
        >
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 00-3 3h15.75m-12.75-3h11.218c1.121-2.3 2.1-4.684 2.924-7.138a60.114 60.114 0 00-16.536-1.84M7.5 14.25L5.106 5.272M6 20.25a.75.75 0 11-1.5 0 .75.75 0 011.5 0zm12.75 0a.75.75 0 11-1.5 0 .75.75 0 011.5 0z"/>
          </svg>
          <span class="hidden sm:inline">Carrinho</span>
          <span id="cartCount" class="hidden absolute -top-1.5 -right-1.5 min-w-[20px] h-5 px-1 bg-red-500 text-white text-xs font-bold rounded-full flex items-center justify-center">0</span>
        </button>
      </div>
    </div>

    <!-- Sub nav -->
    <div class="bg-gray-50 text-gray-600 text-xs border-t border-gray-200">
      <div class="max-w-7xl mx-auto px-4 h-8 flex items-center gap-6">
        <a href="#" class="hover:text-indigo-600 transition">📦 Vender agora</a>
        <a href="#" class="hover:text-indigo-600 transition">🛒 Meus pedidos</a>
        <a href="#" class="hover:text-indigo-600 transition">🔖 Ofertas do dia</a>
        <a href="#" class="hover:text-indigo-600 transition">❓ Ajuda</a>
        <span class="ml-auto flex items-center gap-1 text-green-600 font-medium">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z"/>
          </svg>
          Compra Garantida
        </span>
      </div>
    </div>
  </header>

  <!-- ===== CATEGORY BAR ===== -->
  <nav class="bg-white border-b border-gray-200 sticky top-[88px] z-40 shadow-sm">
    <div class="max-w-7xl mx-auto px-4">
      <div id="catBar" class="flex gap-2 py-2.5 overflow-x-auto scrollbar-x"></div>
    </div>
  </nav>

  <!-- ===== MAIN ===== -->
  <main class="max-w-7xl mx-auto px-4 py-6">

    <!-- Promo Banner -->
    <div class="mb-6 rounded-2xl overflow-hidden bg-gradient-to-r from-indigo-600 via-indigo-500 to-purple-600 p-6 flex items-center justify-between">
      <div>
        <div class="text-xs text-indigo-200 font-semibold uppercase tracking-wider mb-1">Ofertas da semana</div>
        <h2 class="text-2xl font-black text-white mb-1">Eletrônicos com até <span class="text-orange-300">60% off</span></h2>
        <p class="text-indigo-200 text-sm">Produtos verificados · Entrega rápida · Garantia de compra</p>
        <button onclick="setCategory('Smartphones')" class="mt-3 bg-orange-400 hover:bg-orange-500 text-white text-sm font-bold px-5 py-2 rounded-xl transition-colors">Ver ofertas →</button>
      </div>
      <div class="hidden md:flex gap-3 text-5xl">📱💻🎮</div>
    </div>

    <!-- Toolbar -->
    <div class="flex items-center justify-between mb-5">
      <p id="resultsLabel" class="text-sm text-gray-500"></p>
      <div class="flex items-center gap-2">
        <span class="text-sm text-gray-500 hidden sm:inline">Ordenar por</span>
        <select id="sortSelect" onchange="setSort(this.value)"
          class="text-sm border border-gray-200 bg-white rounded-lg px-3 py-1.5 outline-none focus:ring-2 focus:ring-indigo-400 cursor-pointer">
          <option value="relevancia">Mais Relevantes</option>
          <option value="menor">Menor Preço</option>
          <option value="maior">Maior Preço</option>
          <option value="vendidos">Mais Vendidos</option>
        </select>
      </div>
    </div>

    <!-- Grid -->
    <div id="grid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4"></div>

    <!-- Empty State -->
    <div id="empty" class="hidden text-center py-20">
      <div class="text-7xl mb-4">🔍</div>
      <h3 class="text-xl font-semibold text-gray-700 mb-1">Nada encontrado</h3>
      <p class="text-gray-400 text-sm">Tente outros termos ou navegue pelas categorias</p>
      <button onclick="resetFilters()" class="mt-4 text-sm text-indigo-600 font-semibold hover:underline">Limpar filtros</button>
    </div>

  </main>

  <!-- ===== PRODUCT MODAL ===== -->
  <div id="modal" class="product-modal hidden">
    <div id="modalBg" class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="closeModal()"></div>
    <div id="modalContent" class="animate-modal relative bg-white rounded-2xl max-w-2xl w-full max-h-[92vh] overflow-y-auto shadow-2xl"></div>
  </div>

  <!-- ===== CART SIDEBAR ===== -->
  <aside id="cartPanel" class="cart-panel"></aside>

</body>
</html>
