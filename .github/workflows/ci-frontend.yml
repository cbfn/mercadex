name: CI — Frontend

on:
  push:
    branches: [main,develop]
    paths:
      - 'frontend/**'
      - '!frontend/RELATORIO_TESTES.md'
      - '.github/workflows/ci-frontend.yml'
      - '.github/scripts/**'
  pull_request:
    branches: [main,develop]
    paths:
      - 'frontend/**'
      - '!frontend/RELATORIO_TESTES.md'
      - '.github/workflows/ci-frontend.yml'
      - '.github/scripts/**'

concurrency:
  group: ci-frontend-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci-frontend:
    name: ci-frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependências
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

      # continue-on-error: true para gerar artefatos e comentário mesmo quando
      # o threshold de 80% não for atingido — a falha é re-emitida no último step.
      - name: Testes com cobertura
        id: tests
        working-directory: frontend
        run: npm run test:coverage
        continue-on-error: true

      - name: Publicar resumo de cobertura no GitHub Actions
        if: always()
        run: |
          mkdir -p .github/scripts/output
          node .github/scripts/generate-comment.js \
            --summary=frontend/coverage/coverage-summary.json \
            --project=frontend \
            --outcome=${{ steps.tests.outcome }} \
            --run-id=${{ github.run_id }} \
            --output=.github/scripts/output/summary-frontend.md
          cat .github/scripts/output/summary-frontend.md >> $GITHUB_STEP_SUMMARY

      - name: Detectar funções sem cobertura adicionadas no PR
        id: uncovered
        if: github.event_name == 'pull_request'
        run: |
          mkdir -p .github/scripts/output
          node .github/scripts/detect-uncovered.js \
            --coverage=frontend/coverage/coverage-final.json \
            --base=${{ github.base_ref }} \
            --project=frontend \
            --output=.github/scripts/output/uncovered-frontend.json
        continue-on-error: true

      - name: Gerar corpo do comentário de PR
        if: github.event_name == 'pull_request'
        run: |
          mkdir -p .github/scripts/output
          node .github/scripts/generate-comment.js \
            --summary=frontend/coverage/coverage-summary.json \
            --uncovered=.github/scripts/output/uncovered-frontend.json \
            --project=frontend \
            --outcome=${{ steps.tests.outcome }} \
            --run-id=${{ github.run_id }} \
            --output=.github/scripts/output/comment-frontend.md

      - name: Criar ou atualizar comentário no PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const commentPath = `${process.env.GITHUB_WORKSPACE}/.github/scripts/output/comment-frontend.md`;
            if (!fs.existsSync(commentPath)) {
              core.warning('Arquivo de comentário não encontrado — pulando.');
              return;
            }
            const body = fs.readFileSync(commentPath, 'utf8');
            const marker = '<!-- ci-frontend-coverage -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });
            const existing = comments.find(
              c => c.user.login === 'github-actions[bot]' && c.body.includes(marker)
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              core.info(`Comentário atualizado: ${existing.html_url}`);
            } else {
              const { data: created } = await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body,
              });
              core.info(`Comentário criado: ${created.html_url}`);
            }

      - name: Upload artefato de cobertura HTML
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-frontend
          path: frontend/coverage/lcov-report/
          retention-days: 14

      - name: Atualizar RELATORIO_TESTES.md
        if: always()
        run: |
          node .github/scripts/update-report.js \
            --summary=frontend/coverage/coverage-summary.json \
            --report=frontend/RELATORIO_TESTES.md \
            --project=frontend \
            --outcome=${{ steps.tests.outcome }} \
            --run-url=https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Commitar relatório de cobertura atualizado
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/RELATORIO_TESTES.md
          if ! git diff --staged --quiet; then
            git commit -m "ci(frontend): atualiza relatório de cobertura [skip ci]"
            git push
          fi

      # Re-emite a falha após gerar todos os artefatos e comentários.
      - name: Falhar se cobertura abaixo do threshold (80%)
        if: steps.tests.outcome == 'failure'
        run: |
          echo "::error title=Cobertura insuficiente — Frontend::❌ Cobertura abaixo do threshold mínimo de 80%. Veja o comentário no PR e o artefato de cobertura para detalhes."
          exit 1

  # Job separado para E2E — não bloqueia o status check de cobertura.
  e2e-frontend:
    name: E2E — Frontend (Playwright)
    runs-on: ubuntu-latest
    needs: ci-frontend
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/develop'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependências
        working-directory: frontend
        run: npm ci

      - name: Build de produção
        working-directory: frontend
        run: npm run build

      - name: Instalar browsers Playwright
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Executar testes E2E
        id: e2e
        working-directory: frontend
        run: npm run test:e2e
        continue-on-error: true

      - name: Publicar resumo E2E no GitHub Actions
        if: always()
        run: |
          mkdir -p .github/scripts/output
          node .github/scripts/generate-e2e-comment.js \
            --results=frontend/playwright-report/results.json \
            --project=frontend \
            --outcome=${{ steps.e2e.outcome }} \
            --run-id=${{ github.run_id }} \
            --output=.github/scripts/output/e2e-summary-frontend.md
          cat .github/scripts/output/e2e-summary-frontend.md >> $GITHUB_STEP_SUMMARY

      - name: Criar ou atualizar comentário E2E no PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const commentPath = `${process.env.GITHUB_WORKSPACE}/.github/scripts/output/e2e-summary-frontend.md`;
            if (!fs.existsSync(commentPath)) {
              core.warning('Arquivo de comentário E2E não encontrado — pulando.');
              return;
            }
            const body = fs.readFileSync(commentPath, 'utf8');
            const marker = '<!-- ci-frontend-e2e -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });
            const existing = comments.find(
              c => c.user.login === 'github-actions[bot]' && c.body.includes(marker)
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              core.info(`Comentário E2E atualizado: ${existing.html_url}`);
            } else {
              const { data: created } = await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body,
              });
              core.info(`Comentário E2E criado: ${created.html_url}`);
            }

      - name: Upload relatório Playwright
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-frontend
          path: frontend/playwright-report/
          retention-days: 7

      - name: Falhar se testes E2E falharam
        if: steps.e2e.outcome == 'failure'
        run: |
          echo "::error title=Testes E2E — Frontend::❌ Um ou mais testes E2E falharam. Veja o comentário no PR e o artefato playwright-report-frontend para detalhes."
          exit 1
